version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: wikipedia_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: pruebas
    ports:
      - "5432:5432"
    volumes:
      - ./backend/scripts/create-table.sql:/docker-entrypoint-initdb.d/create-table.sql
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: